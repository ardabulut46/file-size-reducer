name: file-size-reducer
services:
  - name: web
    github:
      branch: main
      deploy_on_push: true
    build_command: apt-get update && apt-get install -y ffmpeg libsm6 libxext6 && pip install -r requirements.txt && mkdir -p uploads processed
    run_command: gunicorn wsgi:app
    envs:
      - key: PYTHONUNBUFFERED
        value: "1"
    http_port: 8080
    routes:
      - path: /
    packages:
      - ffmpeg
      - libsm6
      - libxext6 